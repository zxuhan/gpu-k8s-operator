{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled -}}
{{- /*
  With issuerRef.name empty, the chart creates a self-signed Issuer
  in the release namespace and uses it. That's sufficient for an
  in-cluster webhook (the kube-apiserver is the only client). If the
  user overrides issuerRef, we trust them and skip the self-signed
  Issuer entirely.
*/}}
{{- if not .Values.webhook.certManager.issuerRef.name }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "gwb-operator.fullname" . }}-selfsigned
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gwb-operator.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "gwb-operator.webhookCertName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gwb-operator.labels" . | nindent 4 }}
spec:
  secretName: {{ include "gwb-operator.webhookCertSecretName" . }}
  dnsNames:
    - {{ include "gwb-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc
    - {{ include "gwb-operator.webhookServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- if .Values.webhook.certManager.issuerRef.name }}
    name: {{ .Values.webhook.certManager.issuerRef.name }}
    kind: {{ default "Issuer" .Values.webhook.certManager.issuerRef.kind }}
    {{- else }}
    name: {{ include "gwb-operator.fullname" . }}-selfsigned
    kind: Issuer
    {{- end }}
{{- end }}
