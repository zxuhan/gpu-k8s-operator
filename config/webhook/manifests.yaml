---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-budget-zxuhan-dev-v1alpha1-gpuworkloadbudget
  failurePolicy: Fail
  name: vgpuworkloadbudget-v1alpha1.kb.io
  rules:
  - apiGroups:
    - budget.zxuhan.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - gpuworkloadbudgets
  sideEffects: None
