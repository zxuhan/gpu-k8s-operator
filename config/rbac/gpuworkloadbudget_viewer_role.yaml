# This rule is not used by the project gpu-k8s-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to budget.zxuhan.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-k8s-operator
    app.kubernetes.io/managed-by: kustomize
  name: gpuworkloadbudget-viewer-role
rules:
- apiGroups:
  - budget.zxuhan.dev
  resources:
  - gpuworkloadbudgets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - budget.zxuhan.dev
  resources:
  - gpuworkloadbudgets/status
  verbs:
  - get
